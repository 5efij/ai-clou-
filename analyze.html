<!DOCTYPE html>
<html>
<body style="text-align:center; background:#0f172a; color:white;">

<h2>📸 Analyze Image</h2>

<button onclick="startAI()">🚀 Start AI</button><br><br>

<input type="file" id="upload"><br><br>
<img id="image" width="250"><br><br>

<p id="result">Click Start AI first</p>

<a href="dashboard.html">⬅ Back</a>

<!-- AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script>
let model;
let ready = false;

const upload = document.getElementById("upload");
const image = document.getElementById("image");
const result = document.getElementById("result");

// تشغيل AI بزر
async function startAI(){
  result.innerText = "⏳ Loading AI...";
  model = await mobilenet.load();
  ready = true;
  result.innerText = "✅ AI Ready - Upload Image";
}

// رفع وتحليل
upload.addEventListener("change", (e) => {

  if (!ready) {
    result.innerText = "❌ Click Start AI first";
    return;
  }

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {

    image.src = event.target.result;

    image.onload = async () => {

      result.innerText = "🔍 Analyzing...";

      const predictions = await model.classify(image);
      let top = predictions[0];

      let decision = "Normal";

      if (top.className.includes("knife") || top.className.includes("gun")) {
        decision = "🚨 Dangerous";
      } else if (top.probability < 0.6) {
        decision = "❓ Uncertain";
      }

      result.innerText =
        top.className + " | " +
        (top.probability * 100).toFixed(2) + "% | " +
        decision;

      // history
      let record = `
        <div>
          <p>${top.className} - ${decision}</p>
          <img src="${image.src}" width="100">
        </div>
      `;

      let old = localStorage.getItem("history") || "";
      localStorage.setItem("history", old + record);

    };

  };

  reader.readAsDataURL(file);

});
</script>

</body>
</html>
