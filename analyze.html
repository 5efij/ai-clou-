<!DOCTYPE html>
<html>
<body style="text-align:center; background:#0f172a; color:white;">

<h2>📸 Analyze Image</h2>

<input type="file" id="upload"><br><br>
<img id="image" width="250"><br>
<p id="result"></p>

<a href="dashboard.html">⬅ Back</a>

<script>
const upload = document.getElementById("upload");
const image = document.getElementById("image");
const result = document.getElementById("result");

upload.addEventListener("change", (e) => {

  const file = e.target.files[0];
  if (!file) return;

  image.src = URL.createObjectURL(file);

  // 🔥 تحليل وهمي (بس حتى النظام يشتغل)
  let fakeResult = "Object: Image Uploaded\nStatus: Processed ✅";

  result.innerText = fakeResult;

  let record = `
    <div>
      <p>${fakeResult}</p>
      <img src="${image.src}" width="100">
    </div>
  `;

  let old = localStorage.getItem("history") || "";
  localStorage.setItem("history", old + record);
});
</script>

</body>
</html>
