<!DOCTYPE html>
<html>
<body style="text-align:center; background:#0f172a; color:white;">

<h2>📸 Analyze Image</h2>

<input type="file" id="upload"><br><br>
<img id="image" width="250"><br><br>

<p id="result">⏳ Loading...</p>

<a href="dashboard.html">⬅ Back</a>

<!-- AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyC1v-zF7WVcTHelodhNQZdKCQ6Pa4ov8Mk",
  authDomain: "ai-project-67d70.firebaseapp.com",
  projectId: "ai-project-67d70",
  storageBucket: "ai-project-67d70.firebasestorage.app",
  messagingSenderId: "46948162281",
  appId: "1:46948162281:web:5d9f1a8e5d560dcdcc2e78"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// تحميل المودل
let model;

async function loadModel(){
  result.innerText = "⏳ Loading AI model...";
  model = await mobilenet.load();
  result.innerText = "✅ Model Ready - Upload Image";
}

loadModel();

const upload = document.getElementById("upload");
const image = document.getElementById("image");
const result = document.getElementById("result");

// رفع وتحليل
upload.addEventListener("change", async (e) => {

  if (!model) {
    result.innerText = "⏳ Model still loading...";
    return;
  }

  const file = e.target.files[0];
  if (!file) return;

  // 🔥 عرض الصورة أولاً
  image.src = URL.createObjectURL(file);

  // 🔥 ننتظر الصورة تتحمل
  image.onload = async () => {

    result.innerText = "🔍 Analyzing...";

    const predictions = await model.classify(image);
    let top = predictions[0];

    // decision
    let decision = "Normal";

    if (top.className.includes("knife") || top.className.includes("gun")) {
      decision = "🚨 Dangerous";
    } else if (top.probability < 0.6) {
      decision = "❓ Uncertain";
    }

    // عرض
    result.innerText =
      top.className + " | " +
      (top.probability * 100).toFixed(2) + "% | " +
      decision;

    // تخزين Firebase
    await addDoc(collection(db, "images"), {
      name: top.className,
      decision: decision,
      accuracy: (top.probability * 100).toFixed(2),
      image: image.src,
      user: localStorage.getItem("user")
    });

  };

});

</script>

</body>
</html>
