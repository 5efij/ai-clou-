<!DOCTYPE html>
<html>
<body style="text-align:center; background:#0f172a; color:white;">

<h2>📸 Analyze Image</h2>

<input type="file" id="upload"><br><br>
<img id="image" width="250"><br><br>

<p id="result">Waiting...</p>

<a href="dashboard.html">⬅ Back</a>

<!-- AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script>
let model;

// تحميل المودل
async function loadModel(){
  document.getElementById("result").innerText = "⏳ Loading AI model...";
  model = await mobilenet.load();
  document.getElementById("result").innerText = "✅ Model Ready - Upload Image";
}

loadModel();

const upload = document.getElementById("upload");
const image = document.getElementById("image");
const result = document.getElementById("result");

// تحليل الصورة
upload.addEventListener("change", async (e) => {

  if (!model) {
    result.innerText = "⏳ Model still loading... try again";
    return;
  }

  const file = e.target.files[0];
  if (!file) return;

  image.src = URL.createObjectURL(file);
  result.innerText = "🔍 Analyzing...";

  // نخلي الصورة تتحمل قبل التحليل
  image.onload = async () => {

    const predictions = await model.classify(image);
    let top = predictions[0];

    // decision logic
    let decision = "Normal";

    if (top.className.includes("knife") || top.className.includes("gun")) {
      decision = "🚨 Dangerous";
    } else if (top.probability < 0.6) {
      decision = "❓ Uncertain";
    }

    result.innerText =
      top.className + " | " +
      (top.probability * 100).toFixed(2) + "% | " +
      decision;

    // تخزين
    let record = `
      <div>
        <p>${top.className} - ${decision}</p>
        <img src="${image.src}" width="100">
      </div>
    `;

    let old = localStorage.getItem("history") || "";
    localStorage.setItem("history", old + record);
  };

});
</script>

</body>
</html>
