<!DOCTYPE html>
<html>
<body style="text-align:center; background:#0f172a; color:white;">

<h2>📸 Analyze Image</h2>

<button onclick="startAI()">🚀 Start AI</button><br><br>

<input type="file" id="upload"><br><br>
<img id="image" width="250"><br><br>

<p id="result">Click Start AI first</p>

<a href="dashboard.html">⬅ Back</a>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<script>
let model;
let ready = false;

const upload = document.getElementById("upload");
const image = document.getElementById("image");
const result = document.getElementById("result");

async function startAI(){
  result.innerText = "⏳ Loading AI...";
  model = await mobilenet.load();
  ready = true;
  result.innerText = "✅ AI Ready";
}

upload.addEventListener("change", async (e) => {

  if (!ready) {
    result.innerText = "❌ Click Start AI first";
    return;
  }

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function(event) {

    image.src = event.target.result;
    result.innerText = "🔍 Analyzing...";

    // ⏳ ننتظر شوي حتى تنعرض الصورة
    await new Promise(r => setTimeout(r, 500));

    try {
      const predictions = await model.classify(image);
      let top = predictions[0];

      let decision = "Normal";

      if (top.className.includes("knife") || top.className.includes("gun")) {
        decision = "🚨 Dangerous";
      } else if (top.probability < 0.6) {
        decision = "❓ Uncertain";
      }

      result.innerText =
        top.className + " | " +
        (top.probability * 100).toFixed(2) + "% | " +
        decision;

    } catch (err) {
      result.innerText = "❌ Error in analysis";
      console.error(err);
    }

  };

  reader.readAsDataURL(file);

});
</script>

</body>
</html>
